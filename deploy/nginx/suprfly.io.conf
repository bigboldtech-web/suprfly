server {
    listen 80;
    server_name suprfly.io www.suprfly.io;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name suprfly.io www.suprfly.io;

    ssl_certificate /www/server/panel/vhost/cert/suprfly.io/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/suprfly.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/suprfly/apps/suprfly/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
