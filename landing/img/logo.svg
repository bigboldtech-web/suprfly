<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="18" cy="18" r="18" fill="url(#bg)"/>

  <!-- Bee — flat, minimal, white silhouette -->
  <!-- Body: 3 stacked rounded bars (like beehiiv style) -->
  <rect x="11" y="14" width="14" height="3" rx="1.5" fill="white"/>
  <rect x="12" y="19" width="12" height="3" rx="1.5" fill="white"/>
  <rect x="13" y="24" width="10" height="2.5" rx="1.25" fill="white"/>

  <!-- Head -->
  <circle cx="18" cy="10.5" r="3.5" fill="white"/>

  <!-- Wings — two simple angled ovals -->
  <ellipse cx="8.5" cy="14" rx="4" ry="2" fill="white" opacity="0.6" transform="rotate(-20 8.5 14)"/>
  <ellipse cx="27.5" cy="14" rx="4" ry="2" fill="white" opacity="0.6" transform="rotate(20 27.5 14)"/>

  <!-- Antennae — two simple lines -->
  <line x1="15.5" y1="7.5" x2="12" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.5" y1="7.5" x2="24" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
